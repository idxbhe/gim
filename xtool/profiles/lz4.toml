# gim compression profile: lz4
# LZ4 — fastest encode and decode, lower ratio.

name = "lz4"
description = "LZ4 — fastest repack and unpack, larger output"

[precomp]
codecs = "auto"
chunk_size = "64mb"
depth = 0
dbase = true
dedup = true
low_memory = false
skip_verify = false
threads = "0"

[compress]
algorithm = "lz4"
level = 12
threads = "0"
